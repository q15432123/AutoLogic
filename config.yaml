autologic:
  version: "0.2.0"

gemini:
  api_key: ""  # Override with GEMINI_API_KEY env var
  model: "gemini-1.5-pro-latest"

whisper:
  model_size: "base"

pipeline:
  workspace_dir: "_workspaces"
  max_concurrent_nodes: 4
  node_timeout_seconds: 120
  stop_on_error: false

server:
  host: "0.0.0.0"
  port: 8000

deploy:
  firebase_project_id: ""  # Override with FIREBASE_PROJECT_ID env var

logging:
  level: "INFO"
  file: null  # Set to "autologic.log" to enable file logging
