    '你的錢包餘額顯示 $0.00。連 Gas Fee 都付不起了。你默默關上了電腦，開始思考去超商打工的可能性。',
    '所有資金蒸發。你試著用 0.001 SOL 買一杯咖啡，交易失敗。遊戲結束。',
    '帳戶清算通知已發送。你的資產已被交易所強制平倉。電腦桌上只剩下一杯涼掉的咖啡。',
  ],
  mental: [
    '你受不了市場的波動，把手機扔出窗外，並在推特上宣布永遠退出幣圈。三天後你又偷偷下載了交易所 APP。',
    '連續 48 小時盯盤後，你的大腦當機了。醫生建議你遠離所有跟數字有關的東西，包括計算機。',
    '你在凌晨三點因為看到一根大陰線而崩潰大哭。你的室友以為發生了什麼大事，結果只是 PEPE 跌了 3%。',
  ],
  conviction: [
    '你對加密貨幣的信仰徹底崩塌了。你賣掉所有持倉，買了定存，並在臉書上發了一篇長文批判區塊鏈。',
    '信仰歸零。你把「To The Moon」的桌布換成了巴菲特的照片，開始研究股票基金。',
    '你再也不相信去中心化了。你取消了所有 Crypto KOL 的追蹤，並開始追蹤園藝頻道。',
  ],
};

// ══════════════════════════════════════
// Rank System
// ══════════════════════════════════════
function getRank(days) {
  if (days >= 100) return { title: '鏈上不死鳥', emoji: '🔥', stars: '★★★★★' };
  if (days >= 60) return { title: '鑽石手傳奇', emoji: '💎', stars: '★★★★☆' };
  if (days >= 40) return { title: '老韭菜', emoji: '🧙', stars: '★★★☆☆' };
  if (days >= 25) return { title: '中級韭菜', emoji: '🥬', stars: '★★☆☆☆' };
  if (days >= 10) return { title: '嫩韭菜', emoji: '🌱', stars: '★☆☆☆☆' };
  return { title: '秒死散戶', emoji: '💀', stars: '☆☆☆☆☆' };
}

// ══════════════════════════════════════
// Game Logic
// ══════════════════════════════════════
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  const ui = document.getElementById('game-ui');
  ui.style.display = 'flex';
  state = { wealth: 50, mental: 50, conviction: 50, day: 1, history: [] };
  usedEvents = new Set();
  gameActive = true;
  updateBars();
  nextEvent();
}

function restartGame() {
  document.getElementById('game-over').className = 'game-over';
  const ui = document.getElementById('game-ui');
  ui.style.display = 'flex';
  state = { wealth: 50, mental: 50, conviction: 50, day: 1, history: [] };
  usedEvents = new Set();
  gameActive = true;
  updateBars();
  document.getElementById('day').textContent = '1';
  nextEvent();
}

function nextEvent() {
  if (!gameActive) return;

  document.getElementById('outcome').className = 'outcome';

  // Pick unused event
  let available = EVENTS.filter((_, i) => !usedEvents.has(i));
  if (available.length === 0) {
    usedEvents.clear();
    available = EVENTS;
  }

  const idx = Math.floor(Math.random() * available.length);
  const event = available[idx];
  const realIdx = EVENTS.indexOf(event);
  usedEvents.add(realIdx);

  // Render card
  const card = document.getElementById('event-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'fadeIn .4s ease-out';

  document.getElementById('event-emoji').textContent = event.emoji;
  document.getElementById('event-text').textContent = event.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = `
    <button class="choice-btn" onclick="choose('a',${realIdx})">
      <span class="choice-letter">A</span>
      <span>${event.a.label}</span>
    </button>
    <button class="choice-btn" onclick="choose('b',${realIdx})">
      <span class="choice-letter">B</span>
      <span>${event.b.label}</span>
    </button>
  `;
}

function choose(choice, eventIdx) {
  if (!gameActive) return;

  const event = EVENTS[eventIdx];
  const effects = choice === 'a' ? event.a : event.b;

  // Apply effects with some randomness (+-5)
  const rand = () => Math.floor(Math.random() * 11) - 5;
  const dw = effects.w + rand();
  const dm = effects.m + rand();
  const dc = effects.c + rand();

  state.wealth = Math.max(0, Math.min(100, state.wealth + dw));
  state.mental = Math.max(0, Math.min(100, state.mental + dm));
  state.conviction = Math.max(0, Math.min(100, state.conviction + dc));

  state.history.push({ event: event.emoji, choice: effects.label, day: state.day });

  // Show outcome
  const outcomeEl = document.getElementById('outcome');
  const net = dw + dm + dc;
  const cls = net > 5 ? 'good' : (net < -5 ? 'bad' : 'neutral');
  const parts = [];
  if (dw !== 0) parts.push(`💰${dw > 0 ? '+' : ''}${dw}`);
  if (dm !== 0) parts.push(`🧠${dm > 0 ? '+' : ''}${dm}`);
  if (dc !== 0) parts.push(`💎${dc > 0 ? '+' : ''}${dc}`);
  outcomeEl.textContent = parts.join('  ');
  outcomeEl.className = `outcome active ${cls}`;

  updateBars();

  // Check game over
  if (state.wealth <= 0 || state.mental <= 0 || state.conviction <= 0) {
    gameActive = false;
    setTimeout(() => gameOver(), 800);
    return;
  }

  // Next day
  state.day++;
  document.getElementById('day').textContent = state.day;

  // Disable buttons briefly then show next event
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  setTimeout(() => nextEvent(), 1200);
}

function updateBars() {
  const stats = ['wealth', 'mental', 'conviction'];
  stats.forEach(s => {
    const val = state[s];
    const bar = document.getElementById('bar-' + s);
    const valEl = document.getElementById('val-' + s);
    bar.style.width = val + '%';
    valEl.textContent = val;

    if (val <= 15) {
      bar.classList.add('danger');
    } else {
      bar.classList.remove('danger');
    }
  });
}

function gameOver() {
  document.getElementById('game-ui').style.display = 'none';

  // Determine cause
  let causeKey = 'wealth';
  if (state.mental <= 0) causeKey = 'mental';
  if (state.conviction <= 0) causeKey = 'conviction';

  const causes = DEATH_CAUSES[causeKey];
  const cause = causes[Math.floor(Math.random() * causes.length)];

  const rank = getRank(state.day);

  document.getElementById('go-days').textContent = state.day;
  document.getElementById('go-cause').textContent = cause;

  document.getElementById('go-stats').innerHTML = `
    <span>💰 ${state.wealth}</span>
    <span>🧠 ${state.mental}</span>
    <span>💎 ${state.conviction}</span>
  `;

  // Build scorecard
  const scorecard = [
    `⛓️ 鏈上生存：韭菜的抉擇`,
    `━━━━━━━━━━━━━━`,
    `${rank.emoji} ${rank.title} ${rank.stars}`,
    `📅 存活天數：${state.day} 天`,
    `💰 資金：${state.wealth} | 🧠 心態：${state.mental} | 💎 信仰：${state.conviction}`,
    `☠️ 死因：${causeKey === 'wealth' ? '破產' : causeKey === 'mental' ? '心態崩潰' : '信仰崩塌'}`,
    `━━━━━━━━━━━━━━`,
    `你能活更久嗎？挑戰 👉`,
  ].join('\n');

  document.getElementById('go-scorecard').textContent = scorecard;

  document.getElementById('game-over').className = 'game-over active';
}

function shareScore() {
  const text = document.getElementById('go-scorecard').textContent + '\n' + window.location.href;

  if (navigator.share) {
    navigator.share({ title: '鏈上生存：韭菜的抉擇', text: text, url: window.location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share-go');
      const orig = btn.textContent;
      btn.textContent = '已複製！去炫耀吧';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {});
  }
}
</script>
