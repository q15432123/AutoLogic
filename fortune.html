// ══════════════════════════════════════
// Hash function (djb2 variant, deterministic)
// ══════════════════════════════════════
function hash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
  }
  return h;
}

function pick(arr, h, offset = 0) {
  return arr[(h + offset) % arr.length];
}

function pickN(arr, h, n, offset = 0) {
  const result = [];
  const used = new Set();
  for (let i = 0; result.length < n && i < arr.length * 3; i++) {
    const idx = (h + offset + i * 7) % arr.length;
    if (!used.has(idx)) {
      used.add(idx);
      result.push(arr[idx]);
    }
  }
  return result;
}

let currentInput = '';

function startReading() {
  const input = document.getElementById('input').value.trim();
  if (!input) {
    document.getElementById('input').style.borderColor = 'var(--red)';
    document.getElementById('input').placeholder = '不輸入怎麼測算啦！';
    setTimeout(() => {
      document.getElementById('input').style.borderColor = '';
      document.getElementById('input').placeholder = '0x... 或輸入你的暱稱';
    }, 1500);
    return;
  }

  currentInput = input;
  const btn = document.getElementById('btn-go');
  btn.disabled = true;

  document.getElementById('input-section').style.display = 'none';
  document.getElementById('result').className = 'result';
  document.getElementById('loading').className = 'loading active';

  const h = hash(input);
  const msgs = pickN(LOADING_MSGS, h, 4);
  const statusEl = document.getElementById('loading-status');
  const progressEl = document.getElementById('progress-fill');

  let step = 0;
  const totalSteps = msgs.length;

  function nextStep() {
    if (step >= totalSteps) {
      showResult(input);
      return;
    }
    statusEl.textContent = msgs[step];
    progressEl.style.width = ((step + 1) / totalSteps * 100) + '%';
    step++;
    setTimeout(nextStep, 600 + Math.random() * 400);
  }

  nextStep();
}

function showResult(input) {
  document.getElementById('loading').className = 'loading';

  const h = hash(input);
  const h2 = hash(input + 'salt');
  const h3 = hash(input + 'salt2');

  // Mingge & Title
  document.getElementById('r-mingge').textContent = '【' + pick(MINGGE, h) + '】';
  document.getElementById('r-title').textContent = pick(TITLES, h2);

  // Leek index (30-99)
  const leekPct = 30 + (h % 70);
  document.getElementById('r-leek-pct').textContent = leekPct + '%';
  const leekFill = document.getElementById('r-leek-fill');
  leekFill.style.width = '0%';
  leekFill.style.background = leekPct > 70
    ? 'linear-gradient(90deg,var(--red),#ff6600)'
    : leekPct > 45
      ? 'linear-gradient(90deg,var(--gold),#ff9900)'
      : 'linear-gradient(90deg,var(--neon),var(--neon3))';
  setTimeout(() => { leekFill.style.width = leekPct + '%'; }, 100);

  // Yi / Ji
  const yiList = pickN(YI, h, 3);
  const jiList = pickN(JI, h2, 3);
  document.getElementById('r-yi').innerHTML = yiList.map(y => '&#x2714; ' + y).join('<br>');
  document.getElementById('r-ji').innerHTML = jiList.map(j => '&#x2718; ' + j).join('<br>');

  // Coins
  const coins = pickN(COINS, h3, 3);
  const coinsHtml = coins.map((c, i) => {
    const change = ((hash(input + c) % 900) + 10);
    const isUp = (hash(c + input) % 3) !== 0;
    const pct = isUp ? '+' + change + '%' : '-' + (change % 95 + 5) + '%';
    const cls = isUp ? 'up' : 'down';
    return `<div class="coin">
      <span class="coin-name">${c}</span>
      <span class="coin-change ${cls}">${pct}</span>
    </div>`;
  }).join('');
  document.getElementById('r-coins').innerHTML = coinsHtml;

  // Comment
  document.getElementById('r-comment').textContent = '「' + pick(COMMENTS, h + h2) + '」';

  // Stats
  const totalReads = 10000 + (h % 90000);
  document.getElementById('stats').textContent =
    '已有 ' + totalReads.toLocaleString() + ' 位韭菜完成測算';

  document.getElementById('result').className = 'result active';
}

function retry() {
  document.getElementById('input-section').style.display = '';
  document.getElementById('result').className = 'result';
  document.getElementById('input').value = '';
  document.getElementById('input').focus();
  document.getElementById('btn-go').disabled = false;
}

function shareResult() {
  const text = `我在 Web3 韭菜運勢測算器測出了「${document.getElementById('r-mingge').textContent}」！\n${document.getElementById('r-title').textContent}\n韭菜指數：${document.getElementById('r-leek-pct').textContent}\n\n快來測你的：`;

  if (navigator.share) {
    navigator.share({
      title: 'Web3 韭菜流年運勢測算器',
      text: text,
      url: window.location.href,
    }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => {
      const btn = document.querySelector('.btn-share');
      const orig = btn.textContent;
      btn.textContent = '已複製到剪貼簿！';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {});
  }
}

// Enter key trigger
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startReading();
});
</script>
</body>
</html>
